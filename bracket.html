<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VIEW BRACKET</title>

  <link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
</head>

<body>

<header class="site-header">
  <div class="site-header__inner">
    <div class="site-brand">WBC Bracket Pool</div>

    <nav class="site-nav">
      <a href="index.html" class="nav-btn">Bracket</a>
      <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
      <a href="admin.html" class="nav-btn hidden" id="admin-link">Admin</a>    </nav>
  </div>
</header>

  <h1 id="bracket-page-title">Bracket</h1>

  <h2>Group Stage</h2>
  <div id="games"></div>

  <h2>Knockout Stage</h2>

  <div class="bracket-labels">
    <h3>Quarterfinals</h3>
    <h3>Semifinals</h3>
    <h3>Final</h3>
    <h3>Champion</h3>
  </div>

  <div id="bracket">
    <div class="match" id="qf1"></div>
    <div class="match" id="sf1"></div>
    <div class="match" id="final"></div>
    <div id="champion"></div>

    <div class="match" id="qf2"></div>

    <div class="match" id="qf3"></div>
    <div class="match" id="sf2"></div>

    <div class="match" id="qf4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase.js"></script>
  <script src="data.js"></script>
  <script src="games.js"></script>
  <script src="state.js"></script>
  <script src="standings.js"></script>
  <script src="bracket.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="bracket-view.js"></script>
  <script>
const links = document.querySelectorAll(".nav-btn");

links.forEach(link => {
  if (window.location.pathname.includes(link.getAttribute("href"))) {
    link.classList.add("active");
  }
});
</script>
</body>
</html>
