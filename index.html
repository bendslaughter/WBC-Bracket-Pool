<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WBC Bracket Pool</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
</head>

<body>

  <h1>World Baseball Classic Bracket Pool</h1>

  <!-- ENTRY SECTION -->
  <div class="entry-section">
    <label for="entry-name">Your Name</label>

    <input
      id="entry-name"
      type="text"
      placeholder="Enter your name"
    />

    <button id="submit-entry">Submit Bracket</button>
  </div>

  <!-- GROUP STAGE -->
  <h2>Group Stage</h2>
  <div id="games"></div>

  <!-- KNOCKOUT STAGE -->
  <h2>Knockout Stage</h2>

  <div class="bracket-labels">
    <h3>Quarterfinals</h3>
    <h3>Semifinals</h3>
    <h3>Final</h3>
    <h3>Champion</h3>
  </div>

  <div id="bracket">
    <div class="match" id="qf1"></div>
    <div class="match" id="sf1"></div>
    <div class="match" id="final"></div>
    <div id="champion"></div>

    <div class="match" id="qf2"></div>

    <div class="match" id="qf3"></div>
    <div class="match" id="sf2"></div>

    <div class="match" id="qf4"></div>
  </div>

  <!-- JAVASCRIPT -->
  <script src="data.js"></script>
  <script src="games.js"></script>
  <script src="state.js"></script>
  <script src="standings.js"></script>
  <script src="bracket.js"></script>
  <script src="scoring.js"></script>
  <script src="app.js"></script>

</body>
</html>
